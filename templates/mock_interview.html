<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Interview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="container">

    <h1>Mock Interview</h1>

    <!-- QUESTION BOX -->
    <div class="card">
        <h2 id="questionDisplay">{{ prev_question }}</h2>
    </div>

    <!-- INPUT BOX -->
    <div class="answer-box">
        <textarea id="userAnswer" placeholder="Type your answer here..."></textarea>
        <button id="submitAnswer">Submit Answer</button>
        <br><br>
        <button id="startRecording">🎤 Start Speaking</button>
        <button id="stopRecording">⏹ Stop</button>
        <p id="recordingStatus"></p>
    </div>

    <!-- RESULT BOX -->
    <div class="side-panel">
        <h3>Response Details</h3>
        <p id="scoreDisplay"></p>
        <p id="feedbackDisplay"></p>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
