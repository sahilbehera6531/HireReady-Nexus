<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: Arial, sans-serif;
            color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .topbar {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .tagline {
            font-size: 1rem;
            color: #ccc;
        }
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: rgba(0,123,255,0.8);
        }
        .hero p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: #f0f0f0;
        }
        .button-container {
            display: flex;
            gap: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
            color: #fff;
            text-decoration: none;
            text-align: center;
        }
        .btn-gd {
            background: linear-gradient(135deg, rgba(0,123,255,0.8), rgba(255,99,71,0.8));
        }
        .btn-gd:hover {
            background: linear-gradient(135deg, rgba(255,99,71,0.8), rgba(0,123,255,0.8));
            transform: scale(1.05);
        }
        .btn-mock {
            background: linear-gradient(135deg, rgba(0,168,204,0.8), rgba(0,123,255,0.8));
        }
        .btn-mock:hover {
            background: linear-gradient(135deg, rgba(0,123,255,0.8), rgba(0,168,204,0.8));
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">HireReady-Nexus</div>
        <div class="tagline">AI-Powered Success Path</div>
    </div>
    <div class="hero">
        <h1>Welcome to the Simulation Portal </h1>
        <p>Prepare for your with our AI-driven simulations for success</p>
        <div class="button-container">
            <a href="/gd" class="btn btn-gd">Group Discussion</a>
            <a href="/mock_interview" class="btn btn-mock">Mock Interview</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
